<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="900" height="650">
  <defs>
    <!-- Washi paper texture -->
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
    </filter>
    <!-- Woodblock print texture -->
    <filter id="woodblock">
      <feTurbulence type="fractalNoise" baseFrequency="0.3 0.02" numOctaves="2" result="grain"/>
      <feColorMatrix type="saturate" values="0" in="grain" result="bw"/>
      <feBlend in="SourceGraphic" in2="bw" mode="multiply" result="tex"/>
      <feComponentTransfer in="tex">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
    <!-- Wave pattern for coin splashes -->
    <pattern id="waves" x="0" y="0" width="40" height="20" patternUnits="userSpaceOnUse">
      <path d="M0 10 Q10 0 20 10 Q30 20 40 10" fill="none" stroke="#1a1a1a" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Koban (oval gold coin) -->
    <g id="koban">
      <ellipse cx="0" cy="0" rx="8" ry="12" fill="#c5a028" stroke="#1a1a1a" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="5" ry="8" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
      <line x1="-3" y1="0" x2="3" y2="0" stroke="#1a1a1a" stroke-width="0.6"/>
      <line x1="0" y1="-4" x2="0" y2="4" stroke="#1a1a1a" stroke-width="0.6"/>
    </g>
    <!-- Small flying koban -->
    <g id="koban-sm">
      <ellipse cx="0" cy="0" rx="5" ry="8" fill="#c5a028" stroke="#1a1a1a" stroke-width="1.2"/>
      <ellipse cx="0" cy="0" rx="3" ry="5" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    </g>
  </defs>

  <!-- Background - aged washi paper -->
  <rect width="900" height="650" fill="#f0e6c8"/>
  <rect width="900" height="650" fill="#e8d9b4" filter="url(#paper)" opacity="0.5"/>

  <!-- Border frame - traditional woodblock -->
  <rect x="20" y="20" width="860" height="610" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="25" y="25" width="850" height="600" fill="none" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Sky gradient - indigo to pale -->
  <rect x="26" y="26" width="848" height="250" fill="#4a6b8a" opacity="0.4"/>
  <rect x="26" y="26" width="848" height="120" fill="#4a6b8a" opacity="0.2"/>

  <!-- Decorative clouds - ukiyo-e style -->
  <path d="M30 80 Q100 50 180 75 Q250 55 320 80 Q360 65 400 78"
        fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.3"/>
  <path d="M500 60 Q560 40 630 65 Q690 45 750 60 Q800 50 860 65"
        fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.3"/>

  <!-- Title cartouche - vertical Japanese text box -->
  <rect x="780" y="40" width="85" height="280" rx="5" fill="#c23b22" opacity="0.85" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="785" y="45" width="75" height="270" rx="3" fill="none" stroke="#f0e6c8" stroke-width="1"/>
  <!-- Japanese title text: 金貨の海に飛び込む大富豪 (The Great Millionaire Diving into a Sea of Gold) -->
  <text x="835" y="75" fill="#f0e6c8" font-family="serif" font-size="22"
        writing-mode="tb" text-anchor="start" letter-spacing="8">金貨之海</text>
  <text x="808" y="75" fill="#f0e6c8" font-family="serif" font-size="22"
        writing-mode="tb" text-anchor="start" letter-spacing="8">大富豪図</text>

  <!-- Vault structure - reimagined as a Japanese storehouse (kura) -->
  <g transform="translate(120, 100)">
    <!-- Kura walls -->
    <rect x="-30" y="0" width="100" height="200" fill="#d4cbb3" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Tile roof -->
    <path d="M-45 0 L20 -35 L85 0 Z" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M-40 0 L20 -30 L80 0" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Roof tiles pattern -->
    <path d="M-30 -5 Q-15 -15 0 -5 Q15 -15 30 -5 Q45 -15 60 -5"
          fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Heavy door -->
    <rect x="5" y="40" width="55" height="100" fill="#5a4a3a" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="10" y="45" width="45" height="90" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Door studs -->
    <circle cx="20" cy="60" r="3" fill="#8a7a5a" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="40" cy="60" r="3" fill="#8a7a5a" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="20" cy="90" r="3" fill="#8a7a5a" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="40" cy="90" r="3" fill="#8a7a5a" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="20" cy="120" r="3" fill="#8a7a5a" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="40" cy="120" r="3" fill="#8a7a5a" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Door handle -->
    <circle cx="50" cy="90" r="5" fill="none" stroke="#1a1a1a" stroke-width="2"/>

    <!-- Servant figure peeking out (Donald as a retainer) -->
    <g transform="translate(30, 35)">
      <!-- Head -->
      <circle cx="0" cy="-5" r="10" fill="#f0e6c8" stroke="#1a1a1a" stroke-width="1.8"/>
      <!-- Hair/topknot -->
      <path d="M-5 -14 Q0 -22 5 -14" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1.5"/>
      <ellipse cx="0" cy="-16" rx="4" ry="2" fill="#1a1a1a"/>
      <!-- Eyes - simple dots -->
      <circle cx="-3" cy="-6" r="1.5" fill="#1a1a1a"/>
      <circle cx="3" cy="-6" r="1.5" fill="#1a1a1a"/>
      <!-- Beak/mouth - simplified -->
      <path d="M-4 0 Q0 4 4 0" fill="#d4a028" stroke="#1a1a1a" stroke-width="1"/>
      <!-- Blue kimono collar visible -->
      <path d="M-8 8 L0 14 L8 8" fill="#2d5a8a" stroke="#1a1a1a" stroke-width="1.5"/>
    </g>

    <!-- Ladder/steps -->
    <line x1="65" y1="140" x2="85" y2="280" stroke="#5a4a3a" stroke-width="3"/>
    <line x1="75" y1="140" x2="95" y2="280" stroke="#5a4a3a" stroke-width="3"/>
    <line x1="67" y1="160" x2="78" y2="160" stroke="#5a4a3a" stroke-width="2"/>
    <line x1="69" y1="190" x2="80" y2="190" stroke="#5a4a3a" stroke-width="2"/>
    <line x1="72" y1="220" x2="83" y2="220" stroke="#5a4a3a" stroke-width="2"/>
    <line x1="75" y1="250" x2="87" y2="250" stroke="#5a4a3a" stroke-width="2"/>
  </g>

  <!-- Mountain of gold koban - the "sea of gold" -->
  <!-- Base mound shape -->
  <path d="M30 620 Q100 400 250 380 Q400 350 500 340
           Q600 350 700 380 Q800 400 870 500 L870 620 Z"
        fill="#b8962a" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Gold texture - koban pattern overlay -->
  <path d="M30 620 Q100 400 250 380 Q400 350 500 340
           Q600 350 700 380 Q800 400 870 500 L870 620 Z"
        fill="url(#waves)" opacity="0.4"/>
  <!-- Highlight layer -->
  <path d="M200 420 Q350 390 500 380 Q620 390 720 420"
        fill="none" stroke="#d4b83a" stroke-width="2" opacity="0.5"/>

  <!-- Individual koban coins on the surface -->
  <use href="#koban" x="100" y="500" transform="rotate(-15 100 500)"/>
  <use href="#koban" x="150" y="480" transform="rotate(20 150 480)"/>
  <use href="#koban" x="220" y="440" transform="rotate(-10 220 440)"/>
  <use href="#koban" x="300" y="410" transform="rotate(5 300 410)"/>
  <use href="#koban" x="380" y="395" transform="rotate(-25 380 395)"/>
  <use href="#koban" x="550" y="390" transform="rotate(15 550 390)"/>
  <use href="#koban" x="630" y="400" transform="rotate(-5 630 400)"/>
  <use href="#koban" x="710" y="420" transform="rotate(30 710 420)"/>
  <use href="#koban" x="780" y="460" transform="rotate(-20 780 460)"/>
  <use href="#koban" x="450" y="400" transform="rotate(10 450 400)"/>
  <use href="#koban" x="60" y="550" transform="rotate(25 60 550)"/>
  <use href="#koban" x="830" y="520" transform="rotate(-30 830 520)"/>
  <use href="#koban" x="500" y="550" transform="rotate(8 500 550)"/>
  <use href="#koban" x="350" y="520" transform="rotate(-12 350 520)"/>
  <use href="#koban" x="650" y="530" transform="rotate(18 650 530)"/>

  <!-- Paper money (as Japanese paper notes) -->
  <g transform="translate(130, 560) rotate(-15)">
    <rect x="0" y="0" width="30" height="15" rx="1" fill="#6a8a4a" stroke="#1a1a1a" stroke-width="1"/>
    <text x="15" y="11" fill="#1a1a1a" font-size="7" text-anchor="middle" font-family="serif">千両</text>
  </g>
  <g transform="translate(270, 580) rotate(10)">
    <rect x="0" y="0" width="30" height="15" rx="1" fill="#6a8a4a" stroke="#1a1a1a" stroke-width="1"/>
    <text x="15" y="11" fill="#1a1a1a" font-size="7" text-anchor="middle" font-family="serif">千両</text>
  </g>
  <g transform="translate(680, 570) rotate(-8)">
    <rect x="0" y="0" width="30" height="15" rx="1" fill="#6a8a4a" stroke="#1a1a1a" stroke-width="1"/>
    <text x="15" y="11" fill="#1a1a1a" font-size="7" text-anchor="middle" font-family="serif">千両</text>
  </g>

  <!-- MAIN FIGURE - Rich merchant (Scrooge) diving into gold -->
  <!-- Reimagined as a wealthy Edo-period merchant -->
  <g transform="translate(480, 300) rotate(-25)">
    <!-- Body/Kimono - red like Scrooge's coat -->
    <path d="M-20 -10 Q-30 20 -25 60 Q-15 80 0 85
             Q15 80 25 60 Q30 20 20 -10 Z"
          fill="#b83a2a" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- Kimono pattern - chrysanthemum hint -->
    <circle cx="-10" cy="20" r="6" fill="none" stroke="#d45a4a" stroke-width="0.8" opacity="0.5"/>
    <circle cx="8" cy="40" r="6" fill="none" stroke="#d45a4a" stroke-width="0.8" opacity="0.5"/>
    <circle cx="-5" cy="55" r="5" fill="none" stroke="#d45a4a" stroke-width="0.8" opacity="0.5"/>
    <!-- Obi (belt) -->
    <path d="M-25 25 Q0 30 25 25 Q30 35 25 40 Q0 45 -25 40 Z"
          fill="#2a2a6a" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- White underkimono visible at chest -->
    <path d="M-8 -10 L0 10 L8 -10" fill="#f0e6c8" stroke="#1a1a1a" stroke-width="1"/>

    <!-- Head -->
    <circle cx="0" cy="-25" r="16" fill="#f0e6c8" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Sideburns/whiskers (like Scrooge's sideburns) -->
    <path d="M-14 -20 Q-22 -15 -18 -8" fill="#d4d4d4" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M14 -20 Q22 -15 18 -8" fill="#d4d4d4" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Glasses/pince-nez -->
    <circle cx="-6" cy="-26" r="5" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="6" cy="-26" r="5" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="-1" y1="-26" x2="1" y2="-26" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Eyes - delighted expression -->
    <path d="M-8 -27 Q-6 -30 -4 -27" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M4 -27 Q6 -30 8 -27" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Beak/bill - stylized -->
    <path d="M-7 -20 Q0 -14 7 -20" fill="#d4a028" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M-5 -19 Q0 -16 5 -19" fill="#c49020" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Big grin -->
    <path d="M-5 -17 Q0 -12 5 -17" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <!-- Top hat → Eboshi (court hat) -->
    <path d="M-12 -38 Q-10 -55 0 -58 Q10 -55 12 -38"
          fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1.5"/>
    <ellipse cx="0" cy="-38" rx="14" ry="4" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="1.5"/>

    <!-- Arms outstretched (diving pose) -->
    <!-- Right arm -->
    <path d="M20 0 Q40 -15 55 -25 Q60 -28 65 -25"
          fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M18 -2 Q38 -18 52 -28" fill="#b83a2a" stroke="none"/>
    <!-- Right hand (white glove → white) -->
    <circle cx="65" cy="-25" r="6" fill="#f0e6c8" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="70" y1="-28" x2="73" y2="-32" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="71" y1="-25" x2="75" y2="-27" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="71" y1="-22" x2="75" y2="-22" stroke="#1a1a1a" stroke-width="1"/>

    <!-- Left arm -->
    <path d="M-20 0 Q-40 -15 -55 -25 Q-60 -28 -65 -25"
          fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- Left hand -->
    <circle cx="-65" cy="-25" r="6" fill="#f0e6c8" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="-70" y1="-28" x2="-73" y2="-32" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="-71" y1="-25" x2="-75" y2="-27" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="-71" y1="-22" x2="-75" y2="-22" stroke="#1a1a1a" stroke-width="1"/>

    <!-- Legs/feet trailing behind -->
    <path d="M-10 80 Q-15 100 -12 115" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M10 80 Q15 100 12 115" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Geta sandals -->
    <rect x="-17" y="112" width="12" height="5" rx="2" fill="#5a4a3a" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="7" y="112" width="12" height="5" rx="2" fill="#5a4a3a" stroke="#1a1a1a" stroke-width="1"/>
  </g>

  <!-- SPLASH EFFECT - Hokusai wave-style gold splash -->
  <!-- Main splash wave -->
  <path d="M380 340 Q360 300 340 310 Q320 280 310 290
           Q290 260 280 280 Q270 250 260 270"
        fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Wave curls (Hokusai-style) -->
  <path d="M260 270 Q255 265 258 260 Q265 258 268 262"
        fill="#c5a028" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M280 280 Q275 272 278 268 Q284 266 286 272"
        fill="#c5a028" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M310 290 Q305 282 308 278 Q314 276 316 282"
        fill="#c5a028" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M340 310 Q335 302 338 298 Q344 296 346 302"
        fill="#c5a028" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Right side splash -->
  <path d="M580 340 Q600 300 620 310 Q640 280 650 290
           Q670 260 680 280 Q690 250 700 270"
        fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <path d="M700 270 Q705 265 702 260 Q695 258 692 262"
        fill="#c5a028" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M680 280 Q685 272 682 268 Q676 266 674 272"
        fill="#c5a028" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M650 290 Q655 282 652 278 Q646 276 644 282"
        fill="#c5a028" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M620 310 Q625 302 622 298 Q616 296 614 302"
        fill="#c5a028" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Flying koban coins -->
  <use href="#koban-sm" x="300" y="250" transform="rotate(30 300 250)"/>
  <use href="#koban-sm" x="340" y="220" transform="rotate(-20 340 220)"/>
  <use href="#koban-sm" x="380" y="200" transform="rotate(45 380 200)"/>
  <use href="#koban-sm" x="280" y="210" transform="rotate(-35 280 210)"/>
  <use href="#koban-sm" x="320" y="180" transform="rotate(10 320 180)"/>

  <use href="#koban-sm" x="660" y="250" transform="rotate(-30 660 250)"/>
  <use href="#koban-sm" x="620" y="220" transform="rotate(20 620 220)"/>
  <use href="#koban-sm" x="580" y="200" transform="rotate(-45 580 200)"/>
  <use href="#koban-sm" x="680" y="210" transform="rotate(35 680 210)"/>
  <use href="#koban-sm" x="640" y="180" transform="rotate(-10 640 180)"/>

  <!-- Center flying coins -->
  <use href="#koban-sm" x="460" y="180" transform="rotate(15 460 180)"/>
  <use href="#koban-sm" x="500" y="160" transform="rotate(-25 500 160)"/>
  <use href="#koban-sm" x="520" y="190" transform="rotate(40 520 190)"/>

  <!-- Splash droplets (small gold dots) -->
  <circle cx="270" cy="240" r="3" fill="#c5a028" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="290" cy="220" r="2" fill="#c5a028" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="250" cy="260" r="2.5" fill="#c5a028" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="310" cy="200" r="2" fill="#c5a028" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="690" cy="240" r="3" fill="#c5a028" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="710" cy="220" r="2" fill="#c5a028" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="720" cy="260" r="2.5" fill="#c5a028" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="660" cy="200" r="2" fill="#c5a028" stroke="#1a1a1a" stroke-width="0.8"/>

  <!-- Shovel reimagined as a koban scoop -->
  <g transform="translate(60, 440) rotate(25)">
    <line x1="0" y1="0" x2="0" y2="70" stroke="#5a4a3a" stroke-width="4"/>
    <path d="M-12 0 Q0 -15 12 0 Q8 10 -8 10 Z" fill="#8a8a8a" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>

  <!-- Money bags (reimagined as Japanese cloth bundles - furoshiki) -->
  <g transform="translate(80, 470)">
    <ellipse cx="0" cy="5" rx="18" ry="14" fill="#8a7a5a" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M-5 -8 Q0 -18 5 -8" fill="#8a7a5a" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Tie -->
    <path d="M-3 -10 Q0 -6 3 -10" fill="none" stroke="#b83a2a" stroke-width="2"/>
    <!-- Kanji for gold -->
    <text x="0" y="10" fill="#1a1a1a" font-family="serif" font-size="12" text-anchor="middle">金</text>
  </g>

  <!-- Artist seal (red stamp) -->
  <g transform="translate(55, 520)">
    <rect x="-18" y="-18" width="36" height="36" rx="2" fill="#c23b22" opacity="0.9"/>
    <text x="0" y="-2" fill="#f0e6c8" font-family="serif" font-size="14" text-anchor="middle">浮世</text>
    <text x="0" y="14" fill="#f0e6c8" font-family="serif" font-size="14" text-anchor="middle">絵師</text>
  </g>

  <!-- Subtitle cartouche -->
  <rect x="35" y="40" width="160" height="35" rx="3" fill="#f0e6c8" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="115" y="63" fill="#1a1a1a" font-family="serif" font-size="13" text-anchor="middle"
        letter-spacing="2">金貨の海に飛び込む図</text>

  <!-- Small text: "Diving into the Sea of Gold Coins" -->
  <text x="115" y="95" fill="#1a1a1a" font-family="serif" font-size="9" text-anchor="middle"
        opacity="0.6" letter-spacing="1">— after the Western tale —</text>

</svg>